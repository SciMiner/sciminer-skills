<body class="stage lang-zh">
  <section class="poster t-structure">
    <div class="brandbar">
      <span class="brand"><span class="dot"></span>SciMiner</span>
      <span class="index">11 / 13</span>
    </div>

    <div class="hero">
      <span class="emoji">🏗️</span>
      <span class="category">结构预测</span>
      <h1>多模态复合体预测</h1>
      <p class="tagline">蛋白、DNA、RNA、配体，可联合预测。</p>
      <p class="summary">使用 Chai-1、Boltz-2 或 AlphaFold3 预测蛋白、核酸、配体及其混合装配体结构，是复杂复合物建模与相互作用分析的核心引擎。</p>

    <div class="section-label">核心能力</div>
    <div class="caps">
      <div class="cap"><span class="bullet">01</span><span>蛋白与蛋白复合体预测</span></div>

      <div class="cap"><span class="bullet">04</span><span>支持 MSA、模板与约束输入</span></div>
      <div class="cap"><span class="bullet">05</span><span>多链装配及置信度评估</span></div>
    </div>

    <div class="io">
      <div class="box">
        <div class="label">输入</div>
        <div class="value">序列 + 配体 SMILES + 可选 MSA</div>
      </div>
      <div class="box">
        <div class="label">输出</div>
        <div class="value">含残基级置信度的 3D 坐标</div>
      </div>
    </div>

    <div class="footer">
      <span class="url">www.sciminer.tech</span>
      <span class="cta">药物发现 · AI 智能体</span>
