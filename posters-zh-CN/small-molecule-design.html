<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>生成式小分子设计 · SciMiner</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
</head>
<body class="stage lang-zh">
  <section class="poster t-smol">
    <div class="brandbar">
      <span class="brand"><span class="dot"></span>SciMiner</span>
      <span class="index">10 / 13</span>
    </div>

    <div class="hero">
      <span class="emoji">🧫</span>
      <span class="category">小分子设计</span>
      <h1>生成式小分子设计</h1>
      <p class="tagline">无结构先验或口袋引导，都能生成成药化学空间。</p>
      <p class="summary">使用 REINVENT4 进行无结构先验生成，或用 PocketXMol 进行口袋引导设计。命中到先导优化、骨架跃迁、片段生长和后评分在同一流程中完成。</p>
    </div>

    <div class="section-label">核心能力</div>
    <div class="caps">
      <div class="cap"><span class="bullet">01</span><span>强化学习分子生成（REINVENT4）</span></div>
      <div class="cap"><span class="bullet">02</span><span>迁移学习与骨架跃迁</span></div>
      <div class="cap"><span class="bullet">03</span><span>口袋引导设计（PocketXMol）</span></div>
      <div class="cap"><span class="bullet">04</span><span>片段连接与生长</span></div>
      <div class="cap"><span class="bullet">05</span><span>后生成评分（Gnina）</span></div>
    </div>

    <div class="io">
      <div class="box">
        <div class="label">输入</div>
        <div class="value">口袋坐标和/或目标蛋白</div>
      </div>
      <div class="box">
        <div class="label">输出</div>
        <div class="value">带对接评分与期望度的 SMILES</div>
      </div>
    </div>

    <div class="footer">
      <span class="url">www.sciminer.tech</span>
      <span class="cta">药物发现 · AI 智能体</span>
    </div>
  </section>
</body>
</html>
